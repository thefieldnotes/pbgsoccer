<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBG Predators — Program Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0A1728; --surface:#12233A; --surface-2:#1A2F4A; --surface-3:#223858;
  --border:#243850; --border-light:#2E4A68;
  --accent:#2E6BAD; --accent-light:#5B9BD5;
  --text:#EEF4FF; --text-muted:#7A9DBE; --text-dim:#3E5A78;
  --green:#27AE60; --red:#E84040; --amber:#F5A623; --purple:#9B59B6;
  --r-sm:6px; --r-md:10px; --r-lg:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}
select option{background:var(--surface-2);color:var(--text);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px;}

/* PIN */
#pin-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;padding:32px 24px;}
.pin-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;box-shadow:0 0 32px rgba(46,107,173,0.4);margin-bottom:20px;}
.pin-h{font-size:20px;font-weight:800;margin-bottom:4px;text-align:center;}
.pin-sub{font-size:13px;color:var(--text-muted);margin-bottom:28px;text-align:center;}
.pin-field{width:100%;max-width:280px;background:var(--surface);border:2px solid var(--border-light);border-radius:var(--r-md);color:var(--text);font-size:24px;font-weight:700;letter-spacing:12px;padding:12px 16px;text-align:center;outline:none;-webkit-text-security:disc;margin-bottom:12px;}
.pin-field:focus{border-color:var(--accent-light);}
.pin-field.shake{animation:shake 0.35s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%,75%{transform:translateX(-8px);}50%{transform:translateX(8px);}}
.pin-go{width:100%;max-width:280px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;border:none;border-radius:var(--r-md);padding:12px;}
.pin-go:hover{background:var(--accent-light);}
.pin-msg{min-height:20px;margin-top:10px;font-size:12px;color:var(--red);text-align:center;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:34px;height:34px;border-radius:50%;object-fit:cover;}
.hdr-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;}
.hdr-sub{font-size:11px;color:var(--text-muted);}
.hdr-nav{display:flex;align-items:center;gap:6px;}
.nav-link{font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;text-decoration:none;color:var(--text-muted);border:1px solid var(--border);transition:all 0.15s;}
.nav-link:hover{color:var(--text);border-color:var(--border-light);}
.nav-link.active{color:var(--accent-light);border-color:var(--accent-light);background:rgba(46,107,173,0.1);}
.sign-out{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;background:none;border:1px solid var(--border);color:var(--text-muted);}

/* FILTER BAR */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.filter-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);margin-right:2px;}
.filter-group{display:flex;align-items:center;gap:6px;}
.f-btn{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text-muted);transition:all 0.15s;}
.f-btn:hover{border-color:var(--border-light);color:var(--text);}
.f-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.filter-divider{width:1px;height:20px;background:var(--border);margin:0 4px;}

/* CONTENT */
.content{padding:20px;max-width:1200px;margin:0 auto;padding-bottom:60px;}

/* LOADING */
.page-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--text-muted);gap:16px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent-light);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SECTION */
.section{margin-bottom:28px;}
.sec-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* HERO CARDS */
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:28px;}
.hero-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:18px 20px;position:relative;overflow:hidden;}
.hero-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.hero-card.blue::before{background:var(--accent-light);}
.hero-card.green::before{background:var(--green);}
.hero-card.red::before{background:var(--red);}
.hero-card.amber::before{background:var(--amber);}
.hero-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:8px;}
.hero-value{font-size:36px;font-weight:900;line-height:1;color:var(--text);margin-bottom:6px;}
.hero-sub{font-size:12px;color:var(--text-muted);}
.hero-trend{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:6px;}
.trend-up{background:rgba(39,174,96,0.14);color:var(--green);}
.trend-down{background:rgba(232,64,64,0.14);color:var(--red);}
.trend-flat{background:rgba(107,127,148,0.14);color:var(--text-muted);}

/* RECORD BAR */
.record-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-top:10px;gap:2px;}
.rb-w{background:var(--green);}
.rb-d{background:var(--amber);}
.rb-l{background:var(--red);}

/* CHART CARDS */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px;}
@media(max-width:700px){.chart-grid{grid-template-columns:1fr;}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:18px 20px;}
.chart-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;}
.chart-sub{font-size:11px;color:var(--text-muted);margin-bottom:16px;}
.chart-wrap{position:relative;height:220px;}

/* TOGGLE PILLS */
.toggle-pills{display:flex;gap:4px;margin-bottom:12px;}
.tpill{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text-muted);}
.tpill.active{background:var(--surface-3);color:var(--text);border-color:var(--border-light);}

/* AGE GROUP BARS */
.age-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:18px 20px;margin-bottom:28px;}
.age-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:600px){.age-grid{grid-template-columns:1fr;}}
.age-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.age-row{margin-bottom:12px;}
.age-row-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.age-name{font-size:12px;font-weight:600;color:var(--text);}
.age-record{font-size:11px;color:var(--text-muted);}
.age-bar-track{height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;}
.age-bar-fill{height:100%;border-radius:4px;transition:width 0.4s ease;}
.age-empty{font-size:12px;color:var(--text-dim);padding:20px 0;text-align:center;}

/* HEAT MAP */
.heat-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:18px 20px;margin-bottom:28px;overflow-x:auto;}
.heat-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px;}
.heat-table th{padding:6px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);text-align:center;border-bottom:1px solid var(--border);background:var(--surface-2);}
.heat-table th.team-col{text-align:left;min-width:160px;}
.heat-table td{padding:5px 8px;border-bottom:1px solid rgba(36,56,80,0.5);}
.heat-table td.team-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;padding-right:16px;}
.heat-cell{text-align:center;border-radius:4px;padding:4px 8px;font-size:11px;font-weight:700;color:#fff;min-width:60px;}
.heat-divider td{padding:4px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);background:var(--surface-2);border-bottom:1px solid var(--border);}

/* HIGHLIGHTS */
.highlights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:28px;}
.hl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 18px;}
.hl-icon{font-size:20px;margin-bottom:8px;}
.hl-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:4px;}
.hl-team{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;}
.hl-value{font-size:11px;color:var(--text-muted);}

/* EMPTY / ERROR */
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty-txt{font-size:14px;}
</style>
</head>

<!-- PIN -->
<div id="pin-screen">

  <div class="pin-sub">PBG Predators Soccer &middot; Competitive Performance</div>
  <input type="password" class="pin-field" id="pin-field" maxlength="6" placeholder="&#8226;&#8226;&#8226;&#8226;" autocomplete="off" inputmode="numeric">
  <button class="pin-go" onclick="doPin()">Access Dashboard</button>
  <div class="pin-msg" id="pin-msg"></div>
</div>

<!-- APP -->
<div id="app">

      <button class="sign-out" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <span class="filter-label">Season</span>
    <div class="filter-group" id="season-filters"></div>
    <div class="filter-divider"></div>
    <span class="filter-label">Gender</span>
    <div class="filter-group">
      <button class="f-btn active" onclick="setFilter('gender','all',this)">All</button>
      <button class="f-btn" onclick="setFilter('gender','Female',this)">Girls</button>
      <button class="f-btn" onclick="setFilter('gender','Male',this)">Boys</button>
    </div>
    <div class="filter-divider"></div>
    <span class="filter-label">Level</span>
    <div class="filter-group">
      <button class="f-btn active" onclick="setFilter('level','all',this)">All</button>
      <button class="f-btn" onclick="setFilter('level','Academy',this)">Academy</button>
      <button class="f-btn" onclick="setFilter('level','Platform',this)">Platform</button>
    </div>
    <div class="filter-divider"></div>
    <span class="filter-label">Competition</span>
    <div class="filter-group">
      <button class="f-btn active" onclick="setFilter('comp','all',this)">All</button>
      <button class="f-btn" onclick="setFilter('comp','league',this)">League</button>
    </div>
  </div>

  <div class="content" id="main-content">
    <div class="page-loading" id="page-loading">
      <div class="spinner"></div>
      <div>Loading match data&hellip;</div>
    </div>
    <div id="dashboard" style="display:none"></div>
  </div>
</div>

// ── AUTH ─────────────────────────────────────────────────────
document.getElementById('pin-field').addEventListener('keydown', e => {
  if (e.key === 'Enter') doPin();
});

function doPin() {
  const v = document.getElementById('pin-field').value.trim();
  if (v === '2847' || v === '1963') {
    ST.pin = v;
    ST.isEditor = v === '2847';
    if (ST.isEditor) document.getElementById('admin-link').style.display = '';
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadData();
  } else {
    const f = document.getElementById('pin-field');
    document.getElementById('pin-msg').textContent = 'Incorrect PIN.';
    f.classList.add('shake');
    setTimeout(() => { f.classList.remove('shake'); document.getElementById('pin-msg').textContent = ''; }, 1500);
  }
}

function signOut() {
  ST.pin = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('pin-field').value = '';
}

// ── API ───────────────────────────────────────────────────────
async function apiFetch(resource) {
  const res = await fetch(`${API}/${resource}`, { headers: { 'x-pin': ST.pin } });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

// ── LOAD DATA ─────────────────────────────────────────────────
async function loadData() {
  try {
    const [rawMatches, rawTeams] = await Promise.all([
      apiFetch('perf/matches?limit=5000'),
      apiFetch('perf/teams')
    ]);

    // Build team map
    ST.teams = {};
    rawTeams.forEach(t => { ST.teams[t.id] = t; });

    // Process matches
    ST.processed = [];
    rawMatches.forEach(m => {
      // Home side — if PBG team
      if (m.home_team_id && ST.teams[m.home_team_id]) {
        const team = ST.teams[m.home_team_id];
        const gf = m.home_score != null ? m.home_score : null;
        const ga = m.away_score != null ? m.away_score : null;
        let result = null;
        if (gf != null && ga != null) {
          result = gf > ga ? 'W' : gf < ga ? 'L' : 'D';
        }
        ST.processed.push({
          matchId: m.id,
          seasonId: m.season_id,
          seasonName: SEASON_NAMES[m.season_id] || '—',
          teamId: team.id,
          team: team,
          tier: team.program_tier || 'Other',
          level: team.program_level,
          programSide: team.program_side,
          gender: m.gender,
          ageGroup: m.age_group,
          result,
          gf, ga,
          gd: (gf != null && ga != null) ? gf - ga : null,
          competitionType: m.competition_type,
          status: m.status,
          date: m.match_date,
          isHome: true
        });
      }
      // Away side — if PBG team and not already counted as home in same match
      if (m.away_team_id && ST.teams[m.away_team_id]) {
        // Avoid double-counting PBG vs PBG: only add away side if home is NOT also PBG
        if (m.home_team_id && ST.teams[m.home_team_id]) return;
        const team = ST.teams[m.away_team_id];
        const gf = m.away_score != null ? m.away_score : null;
        const ga = m.home_score != null ? m.home_score : null;
        let result = null;
        if (gf != null && ga != null) {
          result = gf > ga ? 'W' : gf < ga ? 'L' : 'D';
        }
        ST.processed.push({
          matchId: m.id,
          seasonId: m.season_id,
          seasonName: SEASON_NAMES[m.season_id] || '—',
          teamId: team.id,
          team: team,
          tier: team.program_tier || 'Other',
          level: team.program_level,
          programSide: team.program_side,
          gender: m.gender,
          ageGroup: m.age_group,
          result,
          gf, ga,
          gd: (gf != null && ga != null) ? gf - ga : null,
          competitionType: m.competition_type,
          status: m.status,
          date: m.match_date,
          isHome: false
        });
      }
    });

    console.log('Loaded:', rawMatches.length, 'matches,', rawTeams.length, 'teams,', ST.processed.length, 'processed entries');
    console.log('Played with scores:', ST.processed.filter(m => m.status === 'played' && m.gf != null).length);
    buildSeasonFilters();
    document.getElementById('page-loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderAll();
  } catch(e) {
    document.getElementById('page-loading').innerHTML = `
      <div class="empty">
        <div class="empty-icon">&#9888;</div>
        <div class="empty-txt">Could not load data: ${e.message}</div>
      </div>`;
  }
}

// ── SEASON FILTER BUTTONS ─────────────────────────────────────
function buildSeasonFilters() {
  const el = document.getElementById('season-filters');
  const names = { 'c1000000-0000-0000-0000-000000000001': '2023/24', 'c1000000-0000-0000-0000-000000000002': '2024/25', 'c1000000-0000-0000-0000-000000000003': '2025/26' };
  el.innerHTML = '';
  SEASONS_ORDER.forEach(sid => {
    const btn = document.createElement('button');
    btn.className = 'f-btn active';
    btn.textContent = names[sid];
    btn.dataset.sid = sid;
    btn.onclick = () => toggleSeason(sid, btn);
    el.appendChild(btn);
  });
}

function toggleSeason(sid, btn) {
  if (ST.filters.seasons.has(sid)) {
    if (ST.filters.seasons.size === 1) return; // keep at least one
    ST.filters.seasons.delete(sid);
    btn.classList.remove('active');
  } else {
    ST.filters.seasons.add(sid);
    btn.classList.add('active');
  }
  renderAll();
}

// ── FILTERS ───────────────────────────────────────────────────
function setFilter(type, value, btn) {
  ST.filters[type] = value;
  btn.closest('.filter-group').querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function getFiltered(excludeSeasonFilter) {
  return ST.processed.filter(m => {
    if (!excludeSeasonFilter && !ST.filters.seasons.has(m.seasonId)) return false;
    if (m.status !== 'played') return false;
    if (m.gf == null || m.ga == null) return false;
    if (ST.filters.gender !== 'all' && m.gender !== ST.filters.gender) return false;
    if (ST.filters.level !== 'all' && m.level !== ST.filters.level) return false;
    if (ST.filters.comp === 'league' && m.competitionType !== 'league') return false;
    return true;
  });
}

// ── STATS HELPERS ─────────────────────────────────────────────
function computeStats(matches) {
  let W=0,L=0,D=0,GF=0,GA=0;
  matches.forEach(m => {
    if (m.result === 'W') W++;
    else if (m.result === 'L') L++;
    else if (m.result === 'D') D++;
    GF += m.gf || 0;
    GA += m.ga || 0;
  });
  const GP = W+L+D;
  const winPct = GP ? Math.round(W/GP*1000)/10 : 0;
  const GD = GF-GA;
  return {W,L,D,GP,GF,GA,GD,winPct};
}

function computeByTier(matches) {
  const map = {};
  matches.forEach(m => {
    const t = m.tier || 'Other';
    if (!map[t]) map[t] = [];
    map[t].push(m);
  });
  const result = {};
  Object.entries(map).forEach(([t,arr]) => { result[t] = computeStats(arr); });
  return result;
}

function computeByTierSeason(matches) {
  const map = {};
  matches.forEach(m => {
    const key = `${m.tier}|||${m.seasonName}`;
    if (!map[key]) map[key] = [];
    map[key].push(m);
  });
  const result = {};
  Object.entries(map).forEach(([key,arr]) => {
    const [tier,season] = key.split('|||');
    if (!result[tier]) result[tier] = {};
    result[tier][season] = computeStats(arr);
  });
  return result;
}

function computeByTeamSeason(matches) {
  const map = {};
  matches.forEach(m => {
    if (!map[m.teamId]) map[m.teamId] = {};
    if (!map[m.teamId][m.seasonName]) map[m.teamId][m.seasonName] = [];
    map[m.teamId][m.seasonName].push(m);
  });
  const result = {};
  Object.entries(map).forEach(([tid,seasons]) => {
    result[tid] = {};
    Object.entries(seasons).forEach(([s,arr]) => { result[tid][s] = computeStats(arr); });
  });
  return result;
}

// ── RENDER ALL ────────────────────────────────────────────────
function renderAll() {
  const filtered = getFiltered();
  const allFiltered = getFiltered(true);
  renderHero(filtered, allFiltered);
  renderClubTrajectory();
  renderTierBar(filtered);
  renderAgeBreakdown(filtered);
  renderHeatMap(filtered);
  renderHighlightsAndLowlights(filtered);
}

// ── HERO ──────────────────────────────────────────────────────
function renderHero(matches, allMatches) {
  const stats = computeStats(matches);
  const GP = stats.GP;

  // Previous season comparison (single season selected)
  let trendHTML = '';
  if (ST.filters.seasons.size === 1) {
    const curSid = [...ST.filters.seasons][0];
    const curIdx = SEASONS_ORDER.indexOf(curSid);
    if (curIdx > 0) {
      const prevSid = SEASONS_ORDER[curIdx - 1];
      const prevMatches = ST.processed.filter(m => {
        if (m.seasonId !== prevSid || m.status !== 'played') return false;
        if (m.gf == null || m.ga == null) return false;
        if (ST.filters.gender !== 'all' && m.gender !== ST.filters.gender) return false;
        if (ST.filters.level !== 'all' && m.level !== ST.filters.level) return false;
        if (ST.filters.comp === 'league' && m.competitionType !== 'league') return false;
        return true;
      });
      const prevStats = computeStats(prevMatches);
      const diff = Math.round((stats.winPct - prevStats.winPct) * 10) / 10;
      const cls = diff > 1 ? 'trend-up' : diff < -1 ? 'trend-down' : 'trend-flat';
      const arrow = diff > 1 ? '&#8593;' : diff < -1 ? '&#8595;' : '&#8594;';
      trendHTML = `<div class="hero-trend ${cls}">${arrow} ${Math.abs(diff)}% vs prior season</div>`;
    }
  }

  const wPct = GP ? Math.round(stats.W/GP*100) : 0;
  const lPct = GP ? Math.round(stats.L/GP*100) : 0;
  const dPct = GP ? Math.max(0,100-wPct-lPct) : 0;

  const gdColor = stats.GD > 0 ? 'var(--green)' : stats.GD < 0 ? 'var(--red)' : 'var(--text-muted)';
  const heroCard = ST.filters.gender === 'Female' ? 'blue' : ST.filters.gender === 'Male' ? 'blue' : 'blue';

  let html = `
  <div class="hero-grid">
    <div class="hero-card blue">
      <div class="hero-label">Overall Record</div>
      <div class="hero-value">${stats.W}–${stats.L}–${stats.D}</div>
      <div class="hero-sub">${GP} games played</div>
      <div class="record-bar">
        <div class="rb-w" style="width:${wPct}%"></div>
        <div class="rb-d" style="width:${dPct}%"></div>
        <div class="rb-l" style="width:${lPct}%"></div>
      </div>
    </div>
    <div class="hero-card ${stats.winPct >= 50 ? 'green' : stats.winPct >= 40 ? 'amber' : 'red'}">
      <div class="hero-label">Win Rate</div>
      <div class="hero-value">${stats.winPct}%</div>
      <div class="hero-sub">W / (W+L+D)</div>
      ${trendHTML}
    </div>
    <div class="hero-card ${stats.GD >= 0 ? 'green' : 'red'}">
      <div class="hero-label">Goal Differential</div>
      <div class="hero-value" style="color:${gdColor}">${stats.GD >= 0 ? '+' : ''}${GP ? (Math.round(stats.GD/GP*10)/10).toFixed(1) : '0.0'}</div>
      <div class="hero-sub">per game &middot; ${stats.GF} scored &middot; ${stats.GA} conceded</div>
    </div>
    <div class="hero-card amber">
      <div class="hero-label">Active Teams</div>
      <div class="hero-value">${new Set(matches.map(m => m.teamId)).size}</div>
      <div class="hero-sub">across ${ST.filters.seasons.size} season${ST.filters.seasons.size !== 1 ? 's' : ''}</div>
    </div>
  </div>`;

  document.getElementById('dashboard').innerHTML = html +
    '<div id="club-traj-section" class="section"></div>' +
    '<div id="tier-bar-section" class="section"></div>' +
    '<div id="age-section"></div>' +
    '<div id="heat-section"></div>' +
    '<div id="highlights-section"></div>';
}

// ── CLUB TRAJECTORY CHART (full width) ──────────────────────
function renderClubTrajectory() {
  const el = document.getElementById('club-traj-section');
  if (!el) return;

  const seasonLabels = ['2023/24','2024/25','2025/26'];

  // For each group, compute stats per season using comp filter but ignoring gender/level filter
  function groupStats(matchFilter) {
    const result = {};
    seasonLabels.forEach(sName => {
      const sid = Object.entries(SEASON_NAMES).find(([k,v]) => v === sName)?.[0];
      if (!sid) return;
      const m = ST.processed.filter(x => {
        if (!ST.filters.seasons.has(x.seasonId)) return false;
        if (x.seasonId !== sid) return false;
        if (x.status !== 'played' || x.gf == null || x.ga == null) return false;
        if (ST.filters.comp === 'league' && x.competitionType !== 'league') return false;
        return matchFilter(x);
      });
      result[sName] = computeStats(m);
    });
    return result;
  }

  const groups = {
    'Overall':        groupStats(() => true),
    'Platform Boys':  groupStats(m => m.level === 'Platform' && m.programSide === 'Boys'),
    'Platform Girls': groupStats(m => m.level === 'Platform' && m.programSide === 'Girls'),
    'Academy Boys':   groupStats(m => m.level === 'Academy' && m.programSide === 'Boys'),
    'Academy Girls':  groupStats(m => m.level === 'Academy' && m.programSide === 'Girls')
  };

  function metricVal(stats) {
    if (!stats || stats.GP < 3) return null;
    if (ST.trajMetric === 'winpct') return stats.winPct;
    if (ST.trajMetric === 'gd') return stats.GP ? Math.round(stats.GD/stats.GP*100)/100 : 0;
    return stats.GP ? Math.round(stats.GF/stats.GP*10)/10 : 0;
  }

  const datasets = Object.entries(groups).map(([name, seasonData]) => ({
    label: name,
    data: seasonLabels.map(s => metricVal(seasonData[s])),
    borderColor: GROUP_COLORS[name],
    backgroundColor: GROUP_COLORS[name] + '18',
    tension: 0.3,
    borderWidth: name === 'Overall' ? 3 : 2,
    borderDash: name === 'Overall' ? [6,3] : [],
    pointRadius: 5,
    pointHoverRadius: 7,
    spanGaps: true
  }));

  const pillsHTML = `<div class="toggle-pills">
    <button class="tpill ${ST.trajMetric==='winpct'?'active':''}" onclick="setTrajMetric('winpct')">Win %</button>
    <button class="tpill ${ST.trajMetric==='gd'?'active':''}" onclick="setTrajMetric('gd')">GD/Game</button>
    <button class="tpill ${ST.trajMetric==='gf'?'active':''}" onclick="setTrajMetric('gf')">Goals For/Game</button>
  </div>`;

  el.innerHTML = `<div class="chart-card" style="margin-bottom:16px">
    <div class="chart-title">Club Performance Trajectory</div>
    <div class="chart-sub">Year-over-year by program segment &middot; min 3 games per season</div>
    ${pillsHTML}
    <div class="chart-wrap" style="height:280px"><canvas id="club-traj-canvas"></canvas></div>
  </div>`;

  ['clubTraj'].forEach(k => { if (ST.charts[k]) { ST.charts[k].destroy(); delete ST.charts[k]; } });

  const ctx = document.getElementById('club-traj-canvas')?.getContext('2d');
  if (!ctx) return;

  const yLabel = ST.trajMetric === 'winpct' ? '%' : ST.trajMetric === 'gd' ? ' GD/g' : ' GF/g';

  ST.charts.clubTraj = new Chart(ctx, {
    type: 'line',
    data: { labels: seasonLabels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#7A9DBE', font: { size: 11 }, boxWidth: 14, padding: 14 }
        },
        tooltip: {
          backgroundColor: '#12233A',
          borderColor: '#2E4A68',
          borderWidth: 1,
          titleColor: '#EEF4FF',
          bodyColor: '#7A9DBE',
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y != null ? ctx.parsed.y + yLabel : 'N/A'}`
          }
        }
      },
      scales: {
        x: { grid: { color: '#243850' }, ticks: { color: '#7A9DBE', font: { size: 12 } } },
        y: {
          grid: { color: '#243850' },
          ticks: { color: '#7A9DBE', font: { size: 11 }, callback: v => v + yLabel },
          min: ST.trajMetric === 'winpct' ? 0 : undefined
        }
      }
    }
  });
}

    if (ST.filters.level !== 'all' && m.level !== ST.filters.level) return false;
    if (ST.filters.comp === 'league' && m.competitionType !== 'league') return false;

  const byTierSeason = computeByTierSeason(allForTier);

// ── AGE GROUP BREAKDOWN ───────────────────────────────────────
function renderAgeBreakdown(matches) {
  const el = document.getElementById('age-section');
  if (!el) return;

  // Group by team, compute stats
  const teamMatches = {};
  matches.forEach(m => {
    if (!teamMatches[m.teamId]) teamMatches[m.teamId] = [];
    teamMatches[m.teamId].push(m);
  });

  const teamStats = [];
  Object.entries(teamMatches).forEach(([tid, arr]) => {
    const team = ST.teams[tid];
    if (!team) return;
    const s = computeStats(arr);
    if (s.GP < 3) return;
    teamStats.push({ team, stats: s });
  });

  const academy = teamStats.filter(t => t.team.program_level === 'Academy')
    .sort((a,b) => (b.team.birth_year||0)-(a.team.birth_year||0));
  const platform = teamStats.filter(t => t.team.program_level === 'Platform')
    .sort((a,b) => (b.team.birth_year||0)-(a.team.birth_year||0));
  const other = teamStats.filter(t => !t.team.program_level)
    .sort((a,b) => (b.team.birth_year||0)-(a.team.birth_year||0));

  function ageRows(arr) {
    if (!arr.length) return '<div class="age-empty">No data for current filters</div>';
    return arr.map(({team,stats}) => {
      const pct = stats.winPct;
      const barColor = pct >= 55 ? 'var(--green)' : pct >= 40 ? 'var(--accent-light)' : pct >= 30 ? 'var(--amber)' : 'var(--red)';
      const tierBadge = team.program_tier ? `<span style="font-size:9px;background:var(--surface-3);color:var(--text-muted);padding:1px 6px;border-radius:3px;margin-left:4px;">${team.program_tier}</span>` : '';
      return `<div class="age-row">
        <div class="age-row-hdr">
          <span class="age-name">${esc(team.canonical_name)}${tierBadge}</span>
          <span class="age-record">${stats.W}W ${stats.L}L ${stats.D}D &middot; ${pct}%</span>
        </div>
        <div class="age-bar-track"><div class="age-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      </div>`;
    }).join('');
  }

  el.innerHTML = `
  <div class="age-section">
    <div class="sec-hdr">Team Win Rate Breakdown</div>
    <div class="age-grid">
      <div>
        <div class="age-col-title">Academy &middot; U12 and under</div>
        ${ageRows(academy)}
        ${other.length ? '<div class="age-col-title" style="margin-top:16px">Unclassified</div>' + ageRows(other) : ''}
      </div>
      <div>
        <div class="age-col-title">Platform &middot; U13 and older</div>
        ${ageRows(platform)}
      </div>
    </div>
  </div>`;
}

// ── HEAT MAP ──────────────────────────────────────────────────
function renderHeatMap(matches) {
  const el = document.getElementById('heat-section');
  if (!el) return;

  const teamSeasonStats = computeByTeamSeason(matches);
  const seasonLabels = ['2023/24','2024/25','2025/26'];

  // Sort teams: Girls first, then Boys, within each by tier order then birth year
  const tierRank = t => TIER_ORDER.indexOf(t) >= 0 ? TIER_ORDER.indexOf(t) : 99;
  const allTeamIds = Object.keys(ST.teams);
  allTeamIds.sort((a,b) => {
    const ta = ST.teams[a], tb = ST.teams[b];
    const sideA = ta.program_side === 'Girls' ? 0 : ta.program_side === 'Boys' ? 1 : 2;
    const sideB = tb.program_side === 'Girls' ? 0 : tb.program_side === 'Boys' ? 1 : 2;
    if (sideA !== sideB) return sideA - sideB;
    const tierA = tierRank(ta.program_tier), tierB = tierRank(tb.program_tier);
    if (tierA !== tierB) return tierA - tierB;
    return (tb.birth_year||0) - (ta.birth_year||0);
  });

  // Filter to teams that have at least some data
  const activeTeams = allTeamIds.filter(tid => teamSeasonStats[tid]);

  function gdColor(gd, gp) {
    if (gp === 0) return { bg: '#0E1E2E', text: 'var(--text-dim)', label: '—' };
    const gdpg = Math.round(gd / gp * 10) / 10;
    const sign = gdpg >= 0 ? '+' : '';
    const label = sign + gdpg.toFixed(1);
    if (gdpg >= 2.0)  return { bg: '#0A4D2A', text: '#7FD19A', label };
    if (gdpg >= 1.0)  return { bg: '#0D6E3A', text: '#A8E6B8', label };
    if (gdpg >= 0.3)  return { bg: '#1A8A50', text: '#CDFADE', label };
    if (gdpg > 0)     return { bg: '#27AE60', text: '#fff', label };
    if (gdpg === 0)   return { bg: '#1A2F4A', text: 'var(--text-muted)', label: '0.0' };
    if (gdpg > -0.3)  return { bg: '#8B3030', text: '#FFCCCC', label };
    if (gdpg > -1.0)  return { bg: '#A01010', text: '#FFB0B0', label };
    if (gdpg > -2.0)  return { bg: '#C00808', text: '#FFD0D0', label };
    return { bg: '#5A0000', text: '#FFB0B0', label };
  }

  let rows = '';
  let lastSide = null;

  activeTeams.forEach(tid => {
    const team = ST.teams[tid];
    if (!team) return;
    const side = team.program_side || 'Other';
    if (side !== lastSide) {
      rows += `<tr class="heat-divider"><td colspan="${seasonLabels.length+1}">${side} Program</td></tr>`;
      lastSide = side;
    }
    const tierBadge = team.program_tier ? `<span style="font-size:9px;background:var(--surface-3);color:var(--text-muted);padding:1px 5px;border-radius:3px;margin-left:5px;">${team.program_tier}</span>` : '';
    rows += `<tr><td class="team-name">${esc(team.canonical_name)}${tierBadge}</td>`;
    seasonLabels.forEach(s => {
      const d = teamSeasonStats[tid]?.[s];
      const c = gdColor(d ? d.GD : 0, d ? d.GP : 0);
      rows += `<td><div class="heat-cell" style="background:${c.bg};color:${c.text};cursor:pointer" title="${team.canonical_name} · ${s}: ${c.label}">${c.label}</div></td>`;
    });
    rows += '</tr>';
  });

  el.innerHTML = `
  <div class="heat-section">
    <div class="sec-hdr">Program Heat Map &middot; GD per Game by Team &amp; Season</div>
    <p style="font-size:11px;color:var(--text-muted);margin-bottom:14px;">Goal differential per game &middot; Green = positive &middot; Red = negative &middot; Darker = more extreme</p>
    <table class="heat-table">
      <thead>
        <tr>
          <th class="team-col">Team</th>
          ${seasonLabels.map(s => `<th>${s}</th>`).join('')}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── HIGHLIGHTS & LOWLIGHTS ───────────────────────────────────
function renderHighlightsAndLowlights(matches) {
  const el = document.getElementById('highlights-section');
  if (!el) return;

  const teamMap = {};
  matches.forEach(m => {
    if (!teamMap[m.teamId]) teamMap[m.teamId] = [];
    teamMap[m.teamId].push(m);
  });

  const entries = Object.entries(teamMap)
    .map(([tid, arr]) => ({ team: ST.teams[tid], stats: computeStats(arr) }))
    .filter(e => e.team && e.stats.GP >= 5);

  if (!entries.length) { el.innerHTML = ''; return; }

  const bestWin  = entries.reduce((a,b) => b.stats.winPct > a.stats.winPct ? b : a);
  const worstWin = entries.reduce((a,b) => b.stats.winPct < a.stats.winPct ? b : a);
  const bestGD   = entries.filter(e=>e.stats.GP>0).reduce((a,b) => (b.stats.GD/b.stats.GP) > (a.stats.GD/a.stats.GP) ? b : a);
  const worstGD  = entries.filter(e=>e.stats.GP>0).reduce((a,b) => (b.stats.GD/b.stats.GP) < (a.stats.GD/a.stats.GP) ? b : a);
  const bestGF   = entries.filter(e=>e.stats.GP>0).reduce((a,b) => (b.stats.GF/b.stats.GP) > (a.stats.GF/a.stats.GP) ? b : a);
  const bestDef  = entries.filter(e=>e.stats.GP>0).reduce((a,b) => (b.stats.GA/b.stats.GP) < (a.stats.GA/a.stats.GP) ? b : a);
  const worstDef = entries.filter(e=>e.stats.GP>0).reduce((a,b) => (b.stats.GA/b.stats.GP) > (a.stats.GA/a.stats.GP) ? b : a);

  // Most improved / biggest decline — compare most recent two selected seasons
  let mostImproved = null, biggestDecline = null;
  const sortedSids = SEASONS_ORDER.filter(s => ST.filters.seasons.has(s));
  if (sortedSids.length >= 2) {
    const cur = sortedSids[sortedSids.length-1];
    const prev = sortedSids[sortedSids.length-2];
    const curByTeam = {}, prevByTeam = {};
    matches.filter(m => m.seasonId === cur).forEach(m => { if (!curByTeam[m.teamId]) curByTeam[m.teamId]=[]; curByTeam[m.teamId].push(m); });
    matches.filter(m => m.seasonId === prev).forEach(m => { if (!prevByTeam[m.teamId]) prevByTeam[m.teamId]=[]; prevByTeam[m.teamId].push(m); });
    let bestDiff = -Infinity, worstDiff = Infinity, bestT = null, worstT = null;
    Object.keys(curByTeam).forEach(tid => {
      if (!prevByTeam[tid]) return;
      const cs = computeStats(curByTeam[tid]), ps = computeStats(prevByTeam[tid]);
      if (cs.GP < 3 || ps.GP < 3) return;
      const diff = cs.winPct - ps.winPct;
      if (diff > bestDiff) { bestDiff = diff; bestT = { team: ST.teams[tid], diff, cs, ps }; }
      if (diff < worstDiff) { worstDiff = diff; worstT = { team: ST.teams[tid], diff, cs, ps }; }
    });
    if (bestT) mostImproved = bestT;
    if (worstT) biggestDecline = worstT;
  }

  function hlCard(icon, label, team, value, isRisk) {
    if (!team) return '';
    const border = isRisk ? 'border-left:3px solid var(--red)' : 'border-left:3px solid var(--green)';
    return `<div class="hl-card" style="${border}">
      <div class="hl-icon">${icon}</div>
      <div class="hl-label">${label}</div>
      <div class="hl-team">${esc(team.canonical_name)}</div>
      <div class="hl-value">${value}</div>
    </div>`;
  }

  const gdFmt = (e) => {
    const v = Math.round(e.stats.GD/e.stats.GP*10)/10;
    return (v>=0?'+':'')+v.toFixed(1)+' GD/g';
  };

  let html = `
    <div class="sec-hdr" style="color:var(--green)">&#10003; Program Highlights</div>
    <div class="highlights-grid" style="margin-bottom:28px">
      ${hlCard('🏆','Best Win Rate',bestWin.team,`${bestWin.stats.winPct}% &middot; ${bestWin.stats.W}W ${bestWin.stats.L}L ${bestWin.stats.D}D`,false)}
      ${hlCard('⚽','Best Goal Differential',bestGD.team,`${gdFmt(bestGD)} &middot; ${bestGD.stats.GF} scored`,false)}
      ${hlCard('🎯','Most Goals Per Game',bestGF.team,`${(bestGF.stats.GF/bestGF.stats.GP).toFixed(1)} GF/game &middot; ${bestGF.stats.GF} total`,false)}
      ${hlCard('🛡','Best Defense',bestDef.team,`${(bestDef.stats.GA/bestDef.stats.GP).toFixed(1)} GA/game &middot; ${bestDef.stats.GA} conceded`,false)}
      ${mostImproved ? hlCard('📈','Most Improved',mostImproved.team,`+${Math.round(mostImproved.diff*10)/10}% win rate vs prior season`,false) : ''}
    </div>
    <div class="sec-hdr" style="color:var(--red)">&#9888; Program Risks &amp; Lowlights</div>
    <div class="highlights-grid">
      ${hlCard('📉','Biggest Decline',biggestDecline?.team,`${Math.round(biggestDecline?.diff*10)/10}% win rate vs prior season`,true)}
      ${hlCard('⚠','Lowest Win Rate',worstWin.team,`${worstWin.stats.winPct}% &middot; ${worstWin.stats.W}W ${worstWin.stats.L}L ${worstWin.stats.D}D`,true)}
      ${hlCard('📊','Worst GD/Game',worstGD.team,`${gdFmt(worstGD)}`,true)}
      ${hlCard('🥅','Most Goals Conceded',worstDef.team,`${(worstDef.stats.GA/worstDef.stats.GP).toFixed(1)} GA/game &middot; ${worstDef.stats.GA} total`,true)}
    </div>`;

  el.innerHTML = html;
}

// ── UTILITIES ─────────────────────────────────────────────────
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
