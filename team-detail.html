<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:#0A1728;color:#fff;font-size:13px;min-height:100vh}
#pin-screen{position:fixed;inset:0;background:#0A1728;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;padding:32px 24px}
.pin-logo-wrap{width:72px;height:72px;border-radius:50%;border:2px solid #2E6BAD;background:#0D1F3C;display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 0 28px rgba(46,107,173,.4)}
.pin-h{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:700;color:#fff;margin-bottom:3px;text-align:center}
.pin-sub{font-size:9px;color:#5B9BD5;margin-bottom:26px;text-align:center;font-family:'Montserrat',sans-serif;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.pin-field{width:100%;max-width:280px;background:#0D1F3C;border:2px solid #1a3a5a;border-radius:2px;color:#fff;font-size:24px;font-weight:700;letter-spacing:12px;padding:12px 16px;text-align:center;outline:none;-webkit-text-security:disc;margin-bottom:10px;font-family:'Montserrat',sans-serif}
.pin-field:focus{border-color:#2E6BAD}
.pin-field.shake{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-8px)}50%{transform:translateX(8px)}}
.pin-go{width:100%;max-width:280px;background:#2E6BAD;color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:2px;padding:12px;font-family:'Montserrat',sans-serif;cursor:pointer}
.pin-go:hover{background:#5B9BD5}
.pin-msg{min-height:18px;margin-top:8px;font-size:12px;color:#C0392B;text-align:center}
.nav{background:#06101E;border-bottom:1px solid #1a2f4a;padding:0 28px;display:flex;align-items:center;height:54px;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;margin-right:36px;flex-shrink:0}
.nav-badge{width:34px;height:34px;border-radius:50%;border:1.5px solid #2E6BAD;background:#0D1F3C;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-title{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;color:#fff;text-transform:uppercase;line-height:1.3;white-space:nowrap}
.nav-title span{color:#5B9BD5;display:block;font-size:9px;font-weight:500;letter-spacing:.07em;margin-top:1px}
.nav-links{display:flex;align-items:stretch;flex:1}
.nav-link{padding:0 18px;display:flex;align-items:center;font-family:'Montserrat',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#4a7a9b;border-bottom:2px solid transparent;height:54px;text-decoration:none;transition:color .15s;white-space:nowrap}
.nav-link:hover{color:#fff}
.nav-link.active{color:#fff;border-bottom-color:#2E6BAD}
.nav-link.soon{color:#2a4a62;pointer-events:none}
.nav-link.soon .soon-tag{font-size:7px;background:#0D2035;color:#2E6BAD;padding:1px 5px;border-radius:2px;margin-left:6px;letter-spacing:.04em;border:1px solid #1a3a5a;vertical-align:middle}
.nav-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.nav-role-badge{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:2px}
.nav-role-editor{background:#3D1F00;color:#FEB95A;border:1px solid #7C3D00}
.nav-role-viewer{background:#0D1F3C;color:#5B9BD5;border:1px solid #2E6BAD}
.nav-signout-btn{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#2a4a62;cursor:pointer;padding:5px 10px;border:1px solid #1a3050;border-radius:2px;background:transparent;transition:all .15s}
.nav-signout-btn:hover{color:#fff;border-color:#2E6BAD}
.page{max-width:940px;margin:0 auto;padding:20px 24px 56px}
.page-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;color:#4a7a9b}
.spinner{width:26px;height:26px;border:3px solid #1a2f4a;border-top-color:#2E6BAD;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.section-label{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#2a4a62;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:#1a2f4a}
.selector-bar{background:#0D1F3C;border:1px solid #1a3a5a;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.selector-label{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#2a4a62;white-space:nowrap}
.team-select{background:#0a1f38;border:1px solid #2E6BAD;color:#fff;font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:2px;outline:none;flex:1;max-width:420px;font-family:'Source Sans 3',sans-serif}
.team-select option,.team-select optgroup{background:#0D1F3C;color:#fff}
.breadcrumb{font-size:11px;color:#2a4a62;margin-bottom:12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.breadcrumb a{color:#2E6BAD;text-decoration:none;font-weight:500}
.breadcrumb a:hover{color:#5B9BD5}
.breadcrumb-sep{color:#1a3050}
.team-header{background:#0D1F3C;border:1px solid #1a3a5a;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.team-name-large{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#fff;flex:1;min-width:160px}
.cohort-tag{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:3px 9px;border-radius:2px}
.tag-platform{background:#0D2035;color:#5B9BD5;border:1px solid #1a4a7a}
.tag-academy{background:#2D1A00;color:#FEB95A;border:1px solid #7C3D00}
.tag-tier{background:#0D1F3C;color:#7a9bbc;border:1px solid #1a3a5a}
.tag-seasons{background:#0A1728;color:#3a6078;border:1px solid #1a2f4a}
.metric-boxes{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.metric-box{background:#0D1F3C;border:1px solid #1a3a5a;border-top:2px solid #2E6BAD;padding:14px}
.mb-label{font-family:'Montserrat',sans-serif;font-size:8px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:#2a4a62;margin-bottom:8px}
.mb-value{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:700;color:#fff;line-height:1;margin-bottom:3px}
.mb-value.sm{font-size:16px}
.mb-sub{font-size:10.5px;color:#5B9BD5;margin-bottom:4px}
.mb-delta{font-size:11px;font-weight:600}
.mb-delta.up{color:#4ADE80}
.mb-delta.down{color:#E74C3C}
.mb-delta.flat{color:#3a6078}
.chart-card{background:#0D1F3C;border:1px solid #1a3a5a;padding:14px 18px;margin-bottom:14px}
.chart-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.chart-title{font-family:'Montserrat',sans-serif;font-size:11.5px;font-weight:700;color:#fff}
.chart-sub{font-size:10.5px;color:#3a6078;margin-top:2px}
.metric-pills{display:flex;gap:0}
.mpill{font-family:'Montserrat',sans-serif;font-size:9.5px;font-weight:600;padding:3px 10px;border:1px solid #1a3a5a;background:transparent;color:#3a6078;cursor:pointer;transition:all .15s;margin-right:-1px}
.mpill:first-child{border-radius:2px 0 0 2px}
.mpill:last-child{border-radius:0 2px 2px 0;margin-right:0}
.mpill.active{background:#0D1F3C;color:#5B9BD5;border-color:#2E6BAD;position:relative;z-index:1}
.chart-wrap{position:relative;height:220px}
.chart-legend-note{margin-top:8px;display:flex;gap:16px;flex-wrap:wrap}
.cl-item{display:flex;align-items:center;gap:6px;font-size:10.5px;color:#5a8099}
.cl-solid{width:20px;height:2px;border-radius:1px;background:#2E6BAD}
.cl-dashed{width:20px;height:0;border-top:2px dashed #F0A500}
.season-table-wrap{background:#0D1F3C;border:1px solid #1a3a5a;overflow-x:auto;margin-bottom:14px}
.season-table{width:100%;border-collapse:collapse;font-size:12px;min-width:560px}
.season-table thead th{background:#06101E;padding:9px 12px;font-family:'Montserrat',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#2a4a62;text-align:center;border-bottom:1px solid #1a2f4a;white-space:nowrap}
.season-table thead th:first-child{text-align:left;padding-left:16px}
.season-table tbody tr{border-bottom:1px solid rgba(26,47,74,.6);transition:background .12s}
.season-table tbody tr:hover td{background:#0a1f38}
.season-table tbody td{padding:9px 12px;text-align:center;font-size:12px;color:#8ab0cc}
.season-table tbody td:first-child{text-align:left;padding-left:16px;color:#c8dce8;font-weight:600;white-space:nowrap}
.era-pill-sm{font-family:'Montserrat',sans-serif;font-size:8px;font-weight:600;letter-spacing:.05em;padding:1px 5px;border-radius:2px;margin-left:5px;vertical-align:middle}
.era-pill-plat{background:#0D2035;color:#5B9BD5}
.era-pill-acad{background:#2D1A00;color:#FEB95A}
.season-table .current-row td{background:#0a1f38;border-left:2px solid #2E6BAD}
.season-table .current-row td:first-child{padding-left:14px}
.td-green{color:#4ADE80!important;font-weight:700}
.td-red{color:#E74C3C!important;font-weight:700}
.trend-up{color:#4ADE80;font-size:11px;font-weight:700}
.trend-dn{color:#E74C3C;font-size:11px;font-weight:700}
.era-divider-row td{padding:7px 12px;background:#06101E!important;font-family:'Montserrat',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-top:1px solid #1a2f4a!important}
.era-divider-inner{display:flex;align-items:center;gap:10px}
.era-div-line{flex:1;height:1px;background:#2D1A00}
.era-div-label{color:#7C3D00;white-space:nowrap}
.std-card{background:#0D1F3C;border:1px solid #1a3a5a;padding:14px 18px;margin-bottom:14px}
.std-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.std-col{background:#0a1f38;border:1px solid #1a2f4a;padding:12px 14px;border-radius:2px}
.std-col-label{font-family:'Montserrat',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#2a4a62;margin-bottom:8px}
.std-record{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:700;color:#fff;margin-bottom:3px}
.std-sub{font-size:11px;color:#5B9BD5;margin-bottom:8px}
.std-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-top:1px solid #1a2f4a;font-size:11.5px}
.std-row-label{color:#5a8099}
.std-row-val{font-weight:700;color:#c8dce8}
.std-row-delta{font-size:10.5px;font-weight:700}
.form-card{background:#0D1F3C;border:1px solid #1a3a5a;padding:14px 18px;margin-bottom:14px}
.form-blocks{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.form-block{width:36px;height:36px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.form-block.W{background:#166534}
.form-block.L{background:#991B1B}
.form-block.D{background:#2a4a62}
.form-stats{display:flex;gap:16px;font-size:11.5px;color:#5a8099;flex-wrap:wrap}
.form-stat-val{font-weight:700;color:#c8dce8;margin-left:3px}
.log-card{background:#0D1F3C;border:1px solid #1a3a5a;padding:14px 18px}
.log-filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.log-filter-btn{font-family:'Montserrat',sans-serif;font-size:9.5px;font-weight:600;padding:3px 10px;border:1px solid #1a3a5a;background:transparent;color:#3a6078;cursor:pointer;border-radius:2px;transition:all .15s}
.log-filter-btn.active{background:#0a1f38;color:#5B9BD5;border-color:#2E6BAD}
.log-count{font-size:10.5px;color:#2a4a62;margin-left:auto}
.log-table-wrap{overflow-x:auto}
.log-table{width:100%;border-collapse:collapse;font-size:12px;min-width:560px}
.log-table thead th{background:#06101E;padding:8px 12px;font-family:'Montserrat',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#2a4a62;text-align:left;border-bottom:1px solid #1a2f4a;white-space:nowrap}
.log-table tbody tr{border-bottom:1px solid rgba(26,47,74,.5);border-left:2px solid transparent;transition:background .12s}
.log-table tbody tr:hover td{background:#0a1f38}
.log-table tbody tr.win{border-left-color:#166534}
.log-table tbody tr.loss{border-left-color:#991B1B}
.log-table tbody tr.draw{border-left-color:#2a4a62}
.log-table tbody td{padding:8px 12px;color:#8ab0cc;vertical-align:middle}
.result-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:3px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800}
.rb-w{background:#166534;color:#d1fae5}
.rb-l{background:#991B1B;color:#fecaca}
.rb-d{background:#2a4a62;color:#93c5fd}
.ha-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:2px;background:#1a2f4a;color:#5a8099}
.log-page{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:#2a4a62}
.log-page-btn{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;padding:3px 9px;border:1px solid #1a3050;background:transparent;color:#3a6078;cursor:pointer;border-radius:2px;transition:all .15s}
.log-page-btn:hover{color:#fff;border-color:#2E6BAD}
.no-data-msg{padding:24px;text-align:center;font-size:12px;color:#2a4a62;font-style:italic}
@media(max-width:900px){.nav{padding:0 16px}.nav-title span{display:none}.nav-link{padding:0 12px;font-size:10px}}
@media(max-width:700px){.metric-boxes{grid-template-columns:1fr 1fr}.std-grid{grid-template-columns:1fr}}
@media(max-width:600px){
  .page{padding:12px 12px 36px}.nav{padding:0 12px;height:48px}.nav-title span{display:none}
  .nav-links{display:none}
  .nav-mobile-menu{display:flex;align-items:center;gap:6px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-left:8px}
  .nav-mobile-menu::-webkit-scrollbar{display:none}
  .nav-mobile-link{font-family:'Montserrat',sans-serif;font-size:9.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#4a7a9b;white-space:nowrap;padding:4px 10px;border:1px solid #1a2f4a;border-radius:2px;text-decoration:none;flex-shrink:0}
  .nav-mobile-link.active{color:#fff;border-color:#2E6BAD;background:#0D1F3C}
  .metric-boxes{grid-template-columns:1fr 1fr}.mb-value{font-size:18px}.chart-wrap{height:180px}
  .team-name-large{font-size:15px}.nav-role-badge{display:none}
}
</style>
</head>

<script>
const API='https://ijdfydxxyhsufbrsnmte.supabase.co/functions/v1/pin-gateway';
const SESSION_KEY='pbg_session_pin';
const SEASON_ORDER=['c1000000-0000-0000-0000-000000000001','c1000000-0000-0000-0000-000000000002','c1000000-0000-0000-0000-000000000003'];
const SEASON_NAMES={'c1000000-0000-0000-0000-000000000001':'2023/24','c1000000-0000-0000-0000-000000000002':'2024/25','c1000000-0000-0000-0000-000000000003':'2025/26'};
const CURRENT_SEASON='c1000000-0000-0000-0000-000000000003';
const PREV_SEASON='c1000000-0000-0000-0000-000000000002';
const SEASON_YEAR={'c1000000-0000-0000-0000-000000000001':2023,'c1000000-0000-0000-0000-000000000002':2024,'c1000000-0000-0000-0000-000000000003':2025};
const LOG_PAGE_SIZE=25;

let ST={pin:null,isEditor:false,teams:{},tierMap:[],allMatches:[],currentTeamId:null,teamMatches:[],chartInst:null,chartMetric:'winpct',logFilter:'all',logPage:0};

(function(){
  const s=sessionStorage.getItem(SESSION_KEY);
  if(s==='2847'||s==='1963'){ST.pin=s;ST.isEditor=s==='2847';showApp();loadAll();}
})();

document.getElementById('pin-field').addEventListener('keydown',function(e){if(e.key==='Enter')doPin();});

function doPin(){
  const v=document.getElementById('pin-field').value.trim();
  if(v==='2847'||v==='1963'){
    sessionStorage.setItem(SESSION_KEY,v);ST.pin=v;ST.isEditor=v==='2847';showApp();loadAll();
  } else {
    const f=document.getElementById('pin-field');
    document.getElementById('pin-msg').textContent='Incorrect PIN.';
    f.classList.add('shake');
    setTimeout(function(){f.classList.remove('shake');document.getElementById('pin-msg').textContent='';},1400);
  }
}
function showApp(){
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  const nb=document.getElementById('nav-role-badge');
  if(nb){nb.textContent=ST.isEditor?'Editor':'Viewer';nb.className='nav-role-badge '+(ST.isEditor?'nav-role-editor':'nav-role-viewer');}

function signOut(){
  sessionStorage.removeItem(SESSION_KEY);ST.pin=null;
  document.getElementById('app').style.display='none';
  document.getElementById('pin-screen').style.display='flex';
  document.getElementById('pin-field').value='';
}

async function apiFetch(r){
  const res=await fetch(API+'/'+r,{headers:{'x-pin':ST.pin}});
  if(!res.ok)throw new Error(r+': '+res.status);
  return res.json();
}

async function loadAll(){
  try{
    const[rawTeams,rawTierMap,rawAllMatches]=await Promise.all([
      apiFetch('perf/teams'),
      apiFetch('perf/competition-tier-map'),
      apiFetch('perf/matches')
    ]);
    ST.teams={};(rawTeams||[]).forEach(function(t){ST.teams[t.id]=t;});
    ST.tierMap=(rawTierMap||[]).slice().sort(function(a,b){return b.priority-a.priority;});
    ST.allMatches=rawAllMatches||[];
    buildSelector();
    const urlTeam=new URLSearchParams(window.location.search).get('team');
    const firstId=urlTeam&&ST.teams[urlTeam]?urlTeam:Object.keys(ST.teams)[0];
    const sel=document.getElementById('team-select');
    if(firstId)sel.value=firstId;
    if(firstId)await loadTeam(firstId);
    else{document.getElementById('page-loading').style.display='none';document.getElementById('page-content').style.display='block';}
  }catch(e){
    document.getElementById('page-loading').innerHTML='<div style="text-align:center;color:#4a7a9b"><div style="font-size:28px;margin-bottom:10px">&#9888;</div><div style="font-family:Montserrat,sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase">Could not load data</div><div style="font-size:11px;margin-top:6px;color:#2a4a62">'+e.message+'</div></div>';
  }
}

function buildSelector(){
  const groups={'Platform Girls':[],'Platform Boys':[],'Academy Girls':[],'Academy Boys':[]};
  Object.values(ST.teams)
    .filter(function(t){return !t.exclude&&t.organization_id==='b1000000-0000-0000-0000-000000000001';})
    .sort(function(a,b){return (b.birth_year||0)-(a.birth_year||0)||(a.canonical_name||'').localeCompare(b.canonical_name||'');})
    .forEach(function(t){
      const key=(t.program_level||'Academy')+' '+(t.program_side||'Girls');
      if(groups[key])groups[key].push(t);
    });
  const sel=document.getElementById('team-select');
  sel.innerHTML=Object.entries(groups).map(function(entry){
    const label=entry[0],teams=entry[1];
    if(!teams.length)return '';
    return '<optgroup label="'+label+'">'+teams.map(function(t){return '<option value="'+t.id+'">'+esc(t.canonical_name)+' \u2014 '+(t.program_tier||'?')+'</option>';}).join('')+'</optgroup>';
  }).join('');
}

async function loadTeam(teamId){
  ST.currentTeamId=teamId;
  document.getElementById('page-loading').style.display='flex';
  document.getElementById('page-content').style.display='none';
  document.getElementById('page-loading').innerHTML='<div class="spinner"></div><div class="load-txt">Loading Team Data&#8230;</div>';
  try{
    // Filter all matches for this team from already-loaded data
    ST.teamMatches=ST.allMatches.filter(function(m){
      return m.home_team_id===teamId||m.away_team_id===teamId;
    });
    ST.logFilter='all';ST.logPage=0;
    document.getElementById('page-loading').style.display='none';
    document.getElementById('page-content').style.display='block';
    renderTeam();
  }catch(e){
    document.getElementById('page-loading').innerHTML='<div style="text-align:center;color:#4a7a9b">&#9888; '+e.message+'</div>';
  }
}

function selectTeam(id){if(id)loadTeam(id);}

function deriveTier(cn){
  if(!cn)return{tier:'\u2014',category:'tournament'};
  const name=cn.toLowerCase();
  for(let i=0;i<ST.tierMap.length;i++){
    if(name.indexOf(ST.tierMap[i].pattern.toLowerCase())>-1)return{tier:ST.tierMap[i].tier,category:ST.tierMap[i].category};
  }
  return{tier:'\u2014',category:'tournament'};
}

function matchPerspective(m){
  const isHome=m.home_team_id===ST.currentTeamId;
  const gf=isHome?m.home_score:m.away_score;
  const ga=isHome?m.away_score:m.home_score;
  const result=gf>ga?'W':gf<ga?'L':'D';
  // Merge club + team name if club field available; fall back to team name only
  const rawTeam=isHome?m.raw_away_team:m.raw_home_team;
  const rawClub=isHome?m.raw_away_club:m.raw_home_club;
  const oppName=(rawClub&&rawClub!==rawTeam)?rawClub+' · '+rawTeam:rawTeam;
  return{isHome:isHome,gf:gf,ga:ga,result:result,oppName:oppName};
}

function computeStats(matches){
  let W=0,D=0,L=0,GF=0,GA=0;
  matches.forEach(function(m){
    const p=matchPerspective(m);
    if(p.result==='W')W++;else if(p.result==='D')D++;else L++;
    GF+=p.gf;GA+=p.ga;
  });
  const GP=W+D+L;
  return{W:W,D:D,L:L,GP:GP,GF:GF,GA:GA,GD:GF-GA,
    winRate:GP?Math.round(W/GP*1000)/10:0,
    gdpg:GP?Math.round((GF-GA)/GP*100)/100:0,
    gfpg:GP?Math.round(GF/GP*100)/100:0};
}

function fmtDate(d){
  if(!d)return '';
  try{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
  catch(e){return d;}
}

function getMatchEra(m){return m.age_group!=null?(m.age_group<=12?'Academy':'Platform'):null;}

function renderTeam(){
  const team=ST.teams[ST.currentTeamId];
  if(!team){document.getElementById('team-body').innerHTML='<div class="no-data-msg">Team not found</div>';return;}

  const era=team.program_level||'Academy';
  const side=team.program_side||'Girls';
  const tier=team.program_tier||'\u2014';
  const urlParam=new URLSearchParams(window.location.search);
  const fromTier=urlParam.get('tier')||tier;
  const birthYear=team.birth_year;

  // Breadcrumb
  document.getElementById('breadcrumb').innerHTML=
    '<a href="performance.html">&#8592; Program Dashboard</a>'+
    '<span class="breadcrumb-sep">&#8250;</span>'+
    '<span style="color:#5B9BD5">'+era+' '+side+'</span>'+
    '<span class="breadcrumb-sep">&#8250;</span>'+
    '<span style="color:#5B9BD5">'+fromTier+'</span>'+
    '<span class="breadcrumb-sep">&#8250;</span>'+
    '<span style="color:#c8dce8">'+esc(team.canonical_name)+'</span>';

  // Filter played matches
  const played=ST.teamMatches.filter(function(m){
    return m.status==='played'&&m.home_score!=null&&m.away_score!=null;
  });

  // Group by season
  const bySeason={};
  SEASON_ORDER.forEach(function(sid){
    bySeason[sid]=played.filter(function(m){return m.season_id===sid;});
  });
  const seasons=SEASON_ORDER.filter(function(sid){return bySeason[sid].length>0;});
  const seasonCount=seasons.length;

  // Current and prior season league matches
  const curLeague=bySeason[CURRENT_SEASON].filter(function(m){return deriveTier(m.competition_name).category==='league';});
  const priLeague=bySeason[PREV_SEASON].filter(function(m){return deriveTier(m.competition_name).category==='league';});
  const curS=computeStats(curLeague);
  const priAtPt=priLeague.slice(0,curS.GP);
  const priSS=computeStats(priAtPt);

  const curAG=curLeague.length&&curLeague[0].age_group?curLeague[0].age_group:null;
  const uAge=curAG?'U'+curAG:(birthYear?'U'+(SEASON_YEAR[CURRENT_SEASON]-birthYear+1):'U?');

  const wrDelta=priSS.GP>=3?Math.round((curS.winRate-priSS.winRate)*10)/10:null;
  const gdDelta=priSS.GP>=3?Math.round((curS.gdpg-priSS.gdpg)*100)/100:null;
  const wDelta=priSS.GP>=3?curS.W-priSS.W:null;
  const eraTagClass=era==='Platform'?'tag-platform':'tag-academy';

  function deltaHtml(val,suffix,isGood){
    if(val===null||val===undefined)return '<span class="mb-delta flat">\u2014 vs prior season</span>';
    const cls=val>0?(isGood?'up':'down'):val<0?(isGood?'down':'up'):'flat';
    const arrow=val>0?'&#8593;':val<0?'&#8595;':'&#8594;';
    const sign=val>0?'+':'';
    return '<span class="mb-delta '+cls+'">'+arrow+' '+sign+val+suffix+' vs same point last season</span>';
  }

  let html=
    '<div class="team-header">'+
      '<div class="team-name-large">'+esc(team.canonical_name)+'</div>'+
      '<span class="cohort-tag '+eraTagClass+'">'+era+'</span>'+
      '<span class="cohort-tag tag-tier">'+tier+'</span>'+
      '<span class="cohort-tag tag-seasons">'+seasonCount+' season'+(seasonCount!==1?'s':'')+' of data</span>'+
    '</div>'+
    '<div class="metric-boxes">'+
      '<div class="metric-box">'+
        '<div class="mb-label">Record</div>'+
        '<div class="mb-value sm">'+curS.W+'&#8211;'+curS.D+'&#8211;'+curS.L+'</div>'+
        '<div class="mb-sub">W &#8211; D &#8211; L &middot; '+SEASON_NAMES[CURRENT_SEASON]+'</div>'+
        (wDelta!==null?'<span class="mb-delta '+(wDelta>0?'up':wDelta<0?'down':'flat')+'">'+(wDelta>0?'&#8593; +'+wDelta+'W':wDelta<0?'&#8595; '+wDelta+'W':'&#8594; Same')+' vs same point last season</span>':'<span class="mb-delta flat">\u2014 vs prior season</span>')+
      '</div>'+
      '<div class="metric-box">'+
        '<div class="mb-label">Win Rate</div>'+
        '<div class="mb-value">'+(curS.GP?curS.winRate.toFixed(1)+'%':'\u2014')+'</div>'+
        '<div class="mb-sub">'+SEASON_NAMES[CURRENT_SEASON]+' season to date</div>'+
        deltaHtml(wrDelta,'pts',true)+
      '</div>'+
      '<div class="metric-box">'+
        '<div class="mb-label">GD / Game</div>'+
        '<div class="mb-value">'+(curS.GP?(curS.gdpg>=0?'+':'')+curS.gdpg.toFixed(2):'\u2014')+'</div>'+
        '<div class="mb-sub">GF '+curS.GF+' &middot; GA '+curS.GA+'</div>'+
        deltaHtml(gdDelta,'',true)+
      '</div>'+
      '<div class="metric-box">'+
        '<div class="mb-label">Age Group</div>'+
        '<div class="mb-value sm">'+uAge+'</div>'+
        '<div class="mb-sub">'+SEASON_NAMES[CURRENT_SEASON]+' &middot; '+era+'</div>'+
        '<span class="mb-delta flat">&#8594; Born '+(birthYear||'?')+' cohort</span>'+
      '</div>'+
    '</div>';

  // Performance Journey Chart
  html+=
    '<div class="section-label">Performance Journey</div>'+
    '<div class="chart-card">'+
      '<div class="chart-top">'+
        '<div>'+
          '<div class="chart-title">Win Rate \u2014 This Team vs Program Historical Average at Age</div>'+
          '<div class="chart-sub">League play only &middot; Dashed = avg of all PBG teams at same age across all seasons</div>'+
        '</div>'+
        '<div class="metric-pills">'+
          '<button class="mpill active" id="pillWP" onclick="setChartMetric(\'winpct\')">Win %</button>'+
          '<button class="mpill" id="pillGD" onclick="setChartMetric(\'gd\')">GD/Game</button>'+
          '<button class="mpill" id="pillGF" onclick="setChartMetric(\'gf\')">GF/Game</button>'+
        '</div>'+
      '</div>'+
      '<div class="chart-wrap"><canvas id="cohortChart"></canvas></div>'+
      '<div class="chart-legend-note">'+
        '<div class="cl-item"><div class="cl-solid"></div>'+esc(team.canonical_name)+'</div>'+
        '<div class="cl-item"><div class="cl-dashed"></div>Program avg at same age (historical)</div>'+
      '</div>'+
    '</div>';

  // Season Record Table — most recent first
  html+='<div class="section-label">Season Record</div>'+
    '<div class="season-table-wrap"><table class="season-table">'+
    '<thead><tr><th>Season</th><th>Age</th><th>GP</th><th>W</th><th>L</th><th>D</th><th>GF</th><th>GA</th><th>GD</th><th>Win%</th><th>Trend</th></tr></thead><tbody>';

  const descSeasons=[].concat(SEASON_ORDER).reverse().filter(function(sid){
    return bySeason[sid]&&bySeason[sid].length>0;
  });
  let shownAcadDiv=false;
  descSeasons.forEach(function(sid,idx){
    const sm=bySeason[sid].filter(function(m){return deriveTier(m.competition_name).category==='league';});
    if(!sm.length)return;
    const ss=computeStats(sm);
    if(ss.GP===0)return;
    const mEra=sm[0]?getMatchEra(sm[0]):era;
    const isPlat=mEra==='Platform';
    // Insert Academy era divider when we drop from Platform to Academy
    if(!shownAcadDiv&&!isPlat&&idx>0){
      shownAcadDiv=true;
      html+='<tr class="era-divider-row"><td colspan="11"><div class="era-divider-inner"><div class="era-div-line"></div><span class="era-div-label">&#9660; Academy Era</span><div class="era-div-line"></div></div></td></tr>';
    }
    const prevSid=descSeasons[idx+1];
    let prevWR=null;
    if(prevSid){
      const psm=bySeason[prevSid].filter(function(m){return deriveTier(m.competition_name).category==='league';});
      const pss=computeStats(psm);
      if(pss.GP>=3)prevWR=pss.winRate;
    }
    const isCur=sid===CURRENT_SEASON;
    const wr=ss.winRate;
    const ag=sm[0]&&sm[0].age_group?sm[0].age_group:null;
    const uL=ag?'U'+ag:(birthYear?'U'+(SEASON_YEAR[sid]-birthYear+1):'?');
    const pilC=isPlat?'era-pill-plat':'era-pill-acad';
    const wrC=wr>=65?'td-green':wr<50?'td-red':'';
    const gdStr=(ss.GD>=0?'+':'')+ss.GD;
    let trend='\u2014';
    if(prevWR!==null){
      const delta=Math.round((wr-prevWR)*10)/10;
      if(delta>=2)trend='<span class="trend-up">&#8593; +'+delta+'%</span>';
      else if(delta<=-2)trend='<span class="trend-dn">&#8595; '+delta+'%</span>';
      else trend='<span style="color:#3a6078">&#8594;</span>';
    }
    html+='<tr'+(isCur?' class="current-row"':'')+'>'+
      '<td>'+SEASON_NAMES[sid]+' <span class="era-pill-sm '+pilC+'">'+(isPlat?'Platform':'Academy')+'</span></td>'+
      '<td>'+uL+'</td><td>'+ss.GP+'</td>'+
      '<td class="td-green">'+ss.W+'</td><td class="td-red">'+ss.L+'</td><td>'+ss.D+'</td>'+
      '<td>'+ss.GF+'</td><td>'+ss.GA+'</td>'+
      '<td class="'+(ss.GD>=0?'td-green':'')+'">'+gdStr+'</td>'+
      '<td class="'+wrC+'">'+wr.toFixed(1)+'%</td>'+
      '<td>'+trend+'</td></tr>';
  });
  html+='</tbody></table></div>';

  // Season to Date comparison
  html+=
    '<div class="section-label">Season to Date</div>'+
    '<div class="std-card"><div class="std-grid">'+
      '<div class="std-col">'+
        '<div class="std-col-label">'+SEASON_NAMES[CURRENT_SEASON]+' &mdash; Current</div>'+
        '<div class="std-record">'+curS.W+'&#8211;'+curS.D+'&#8211;'+curS.L+'</div>'+
        '<div class="std-sub">'+curS.GP+' games played &middot; league only</div>'+
        '<div class="std-row"><span class="std-row-label">Win Rate</span><span class="std-row-val '+(curS.winRate>=60?'td-green':'')+'">'+curS.winRate.toFixed(1)+'%</span></div>'+
        '<div class="std-row"><span class="std-row-label">GD / Game</span><span class="std-row-val">'+(curS.gdpg>=0?'+':'')+curS.gdpg.toFixed(2)+'</span></div>'+
        '<div class="std-row"><span class="std-row-label">Goals For</span><span class="std-row-val">'+curS.GF+'</span></div>'+
        '<div class="std-row"><span class="std-row-label">Goals Against</span><span class="std-row-val">'+curS.GA+'</span></div>'+
      '</div>'+
      '<div class="std-col">'+
        '<div class="std-col-label">'+SEASON_NAMES[PREV_SEASON]+' &mdash; Same Point ('+curS.GP+' gm)</div>'+
        '<div class="std-record">'+priSS.W+'&#8211;'+priSS.D+'&#8211;'+priSS.L+'</div>'+
        '<div class="std-sub">'+(priSS.GP>0?priSS.GP+' games':'No prior data')+'</div>'+
        (priSS.GP>=3?
          '<div class="std-row"><span class="std-row-label">Win Rate</span><span class="std-row-val">'+priSS.winRate.toFixed(1)+'%</span>'+(wrDelta!==null?'<span class="std-row-delta '+(wrDelta>0?'trend-up':'trend-dn')+'">'+(wrDelta>0?'&#8593; +':'')+wrDelta+'pts</span>':'')+'</div>'+
          '<div class="std-row"><span class="std-row-label">GD / Game</span><span class="std-row-val">'+(priSS.gdpg>=0?'+':'')+priSS.gdpg.toFixed(2)+'</span>'+(gdDelta!==null?'<span class="std-row-delta '+(gdDelta>0?'trend-up':'trend-dn')+'">'+(gdDelta>0?'&#8593; +':'')+gdDelta.toFixed(2)+'</span>':'')+'</div>'+
          '<div class="std-row"><span class="std-row-label">Goals For</span><span class="std-row-val">'+priSS.GF+'</span></div>'+
          '<div class="std-row"><span class="std-row-label">Goals Against</span><span class="std-row-val">'+priSS.GA+'</span></div>'
          :'<div class="std-row" style="color:#2a4a62;font-style:italic;font-size:11px;border:none">No prior season data at this game count</div>')+
      '</div>'+
    '</div></div>';

  // Recent Form — last 10 league games
  const leagueDesc=[].concat(played)
    .filter(function(m){return deriveTier(m.competition_name).category==='league';})
    .sort(function(a,b){return (b.match_date||'').localeCompare(a.match_date||'');})
    .slice(0,10);
  const formS=computeStats(leagueDesc);
  html+='<div class="section-label">Recent Form &mdash; Last 10 League Games</div>'+
    '<div class="form-card">'+
    '<div class="form-blocks">'+
    [].concat(leagueDesc).reverse().map(function(m){
      const p=matchPerspective(m);
      return '<div class="form-block '+p.result+'" title="'+p.result+' '+p.gf+'-'+p.ga+' vs '+esc(p.oppName||'?')+'">'+p.result+'</div>';
    }).join('')+
    '</div><div class="form-stats">'+
    '<span>Last '+leagueDesc.length+': <span class="form-stat-val">'+formS.W+'W '+formS.D+'D '+formS.L+'L</span></span>'+
    '<span>Win rate: <span class="form-stat-val" style="'+(formS.winRate>=60?'color:#4ADE80':'')+'">'+formS.winRate.toFixed(1)+'%</span></span>'+
    '<span>GF: <span class="form-stat-val">'+formS.GF+'</span></span>'+
    '<span>GA: <span class="form-stat-val">'+formS.GA+'</span></span>'+
    '</div></div>';

  // Match Log
  html+='<div class="section-label">Match Log</div><div id="log-card" class="log-card"></div>';

  document.getElementById('team-body').innerHTML=html;
  refreshLogCard();

  // Build chart after DOM update
  setTimeout(function(){buildChart('winpct',played,birthYear);},50);
}

function refreshLogCard(){
  const lc=document.getElementById('log-card');
  if(!lc)return;
  lc.innerHTML=renderLogFilters()+renderLogTable();
}

function renderLogFilters(){
  const filtered=getFilteredLog();
  return '<div class="log-filters">'+
    ['all','league','showcase','postseason','tournament'].map(function(c){
      return '<button class="log-filter-btn'+(ST.logFilter===c?' active':'')+'" onclick="setLogFilter(\''+c+'\')">'+(c.charAt(0).toUpperCase()+c.slice(1))+'</button>';
    }).join('')+
    '<span class="log-count">'+filtered.length+' match'+(filtered.length!==1?'es':'')+'</span>'+
    '</div>';
}

function getFilteredLog(){
  const played=ST.teamMatches.filter(function(m){
    return m.status==='played'&&m.home_score!=null&&m.away_score!=null;
  }).sort(function(a,b){return (b.match_date||'').localeCompare(a.match_date||'');});
  if(ST.logFilter==='all')return played;
  return played.filter(function(m){return deriveTier(m.competition_name).category===ST.logFilter;});
}

function renderLogTable(){
  const filtered=getFilteredLog();
  const start=ST.logPage*LOG_PAGE_SIZE;
  const page=filtered.slice(start,start+LOG_PAGE_SIZE);
  const totalPages=Math.ceil(filtered.length/LOG_PAGE_SIZE);
  let html='<div class="log-table-wrap"><table class="log-table">'+
    '<thead><tr><th>Date</th><th>Opponent</th><th>H/A</th><th>Score</th><th>Result</th><th>Competition</th></tr></thead><tbody>';
  if(!page.length){html+='<tr><td colspan="6"><div class="no-data-msg">No matches for this filter</div></td></tr>';}
  page.forEach(function(m){
    const p=matchPerspective(m);
    const rc=p.result==='W'?'win':p.result==='L'?'loss':'draw';
    const rb=p.result==='W'?'rb-w':p.result==='L'?'rb-l':'rb-d';
    html+='<tr class="'+rc+'">'+
      '<td>'+fmtDate(m.match_date)+'</td>'+
      '<td>'+esc(p.oppName||'Unknown')+'</td>'+
      '<td><span class="ha-badge">'+(p.isHome?'H':'A')+'</span></td>'+
      '<td>'+p.gf+'&#8211;'+p.ga+'</td>'+
      '<td><span class="result-badge '+rb+'">'+p.result+'</span></td>'+
      '<td style="font-size:11px;color:#5a8099">'+esc(m.competition_name||'\u2014')+'</td></tr>';
  });
  html+='</tbody></table></div>';
  if(totalPages>1){
    html+='<div class="log-page"><span>'+(start+1)+'\u2013'+Math.min(start+LOG_PAGE_SIZE,filtered.length)+' of '+filtered.length+'</span>';
    if(ST.logPage>0)html+='<button class="log-page-btn" onclick="logPageNav(-1)">&#8592; Prev</button>';
    if(ST.logPage<totalPages-1)html+='<button class="log-page-btn" onclick="logPageNav(1)">Next &#8594;</button>';
    html+='</div>';
  }
  return html;
}

function setLogFilter(f){ST.logFilter=f;ST.logPage=0;refreshLogCard();}
function logPageNav(d){ST.logPage+=d;refreshLogCard();}

// ── CHART ───────────────────────────────────────────────────────
function setChartMetric(m){
  ST.chartMetric=m;
  document.getElementById('pillWP')&&(document.getElementById('pillWP').className='mpill'+(m==='winpct'?' active':''));
  document.getElementById('pillGD')&&(document.getElementById('pillGD').className='mpill'+(m==='gd'?' active':''));
  document.getElementById('pillGF')&&(document.getElementById('pillGF').className='mpill'+(m==='gf'?' active':''));
  const team=ST.teams[ST.currentTeamId];
  if(team){
    const played=ST.teamMatches.filter(function(mm){return mm.status==='played'&&mm.home_score!=null&&mm.away_score!=null;});
    buildChart(m,played,team.birth_year);
  }
}

function buildChart(metric,played,birthYear){
  Chart.defaults.color='#3a6078';
  Chart.defaults.borderColor='#1a2f4a';
  Chart.defaults.font.family="'Montserrat',sans-serif";

  const leagueMatches=played.filter(function(m){return deriveTier(m.competition_name).category==='league';});

  // Build per-season data points for this team
  const teamData=SEASON_ORDER.map(function(sid){
    const sm=leagueMatches.filter(function(m){return m.season_id===sid;});
    if(sm.length<3)return null;
    const ss=computeStats(sm);
    if(metric==='winpct')return parseFloat(ss.winRate.toFixed(1));
    if(metric==='gd')return parseFloat(ss.gdpg.toFixed(2));
    return parseFloat(ss.gfpg.toFixed(2));
  });

  // Build benchmark: for each season, find the team's age group in that season
  // then find ALL PBG teams at that same age across ALL seasons
  const benchData=SEASON_ORDER.map(function(sid){
    const sm=leagueMatches.filter(function(m){return m.season_id===sid;});
    if(!sm.length)return null;
    const ag=sm[0].age_group;
    if(!ag)return null;
    // All PBG matches at this age group across all seasons
    const allAtAge=ST.allMatches.filter(function(m){
      if(m.status!=='played'||m.home_score==null||m.away_score==null)return false;
      if(m.age_group!==ag)return false;
      if(deriveTier(m.competition_name).category!=='league')return false;
      return true;
    });
    // Build per-team perspective entries
    const entries=[];
    allAtAge.forEach(function(m){
      if(m.home_team_id&&ST.teams[m.home_team_id]&&!ST.teams[m.home_team_id].exclude){
        const p={gf:m.home_score,ga:m.away_score};
        p.result=p.gf>p.ga?'W':p.gf<p.ga?'L':'D';
        p.gdpg=p.gf-p.ga;entries.push(p);
      }
      if(m.away_team_id&&ST.teams[m.away_team_id]&&!ST.teams[m.away_team_id].exclude){
        if(m.home_team_id&&ST.teams[m.home_team_id]&&!ST.teams[m.home_team_id].exclude)return;
        const p={gf:m.away_score,ga:m.home_score};
        p.result=p.gf>p.ga?'W':p.gf<p.ga?'L':'D';
        p.gdpg=p.gf-p.ga;entries.push(p);
      }
    });
    if(entries.length<5)return null;
    if(metric==='winpct'){
      const w=entries.filter(function(e){return e.result==='W';}).length;
      return parseFloat((w/entries.length*100).toFixed(1));
    }
    if(metric==='gd'){
      const avg=entries.reduce(function(s,e){return s+(e.gf-e.ga);},0)/entries.length;
      return parseFloat(avg.toFixed(2));
    }
    const avg=entries.reduce(function(s,e){return s+e.gf;},0)/entries.length;
    return parseFloat(avg.toFixed(2));
  });

  const labels=SEASON_ORDER.map(function(s){return SEASON_NAMES[s];});
  const yLabel=metric==='winpct'?'Win %':'Goals';
  // Dynamic Y axis — compute from actual data with padding
  const allChartVals=[...teamData,...benchData].filter(v=>v!==null&&v!==undefined);
  let yMin,yMax;
  if(allChartVals.length){
    const dMin=Math.min(...allChartVals);
    const dMax=Math.max(...allChartVals);
    yMin=Math.max(0,Math.floor((dMin-10)/10)*10);
    yMax=metric==='winpct'?Math.min(100,Math.ceil((dMax+10)/10)*10):Math.ceil((dMax+1)/1)*1+1;
  } else {
    yMin=metric==='winpct'?20:undefined;
    yMax=metric==='winpct'?100:undefined;
  }

  const datasets=[
    {
      label:ST.teams[ST.currentTeamId]?esc(ST.teams[ST.currentTeamId].canonical_name):'This Team',
      data:teamData,
      borderColor:'#2E6BAD',
      backgroundColor:'#2E6BAD18',
      pointBackgroundColor:'#2E6BAD',
      pointRadius:5,pointHoverRadius:7,
      borderWidth:2.5,tension:0.3,spanGaps:true
    },
    {
      label:'Program avg at age (historical)',
      data:benchData,
      borderColor:'#F0A500',
      backgroundColor:'transparent',
      borderDash:[8,5],
      pointBackgroundColor:'#F0A500',
      pointRadius:3,pointHoverRadius:5,
      borderWidth:1.8,tension:0.2,spanGaps:true
    }
  ];

  const ctx=document.getElementById('cohortChart');
  if(!ctx)return;
  if(ST.chartInst){try{ST.chartInst.destroy();}catch(e){}}
  ST.chartInst=new Chart(ctx,{
    type:'line',
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#06101E',borderColor:'#1a3a5a',borderWidth:1,
          titleColor:'#fff',bodyColor:'#8ab0cc',padding:9,
          callbacks:{label:function(c){return ' '+c.dataset.label+': '+c.raw+(metric==='winpct'?'%':'');}}
        }
      },
      scales:{
        y:{min:yMin,max:yMax,
          ticks:{callback:function(v){return metric==='winpct'?v+'%':v;},color:'#2a4a62',font:{size:9},stepSize:metric==='winpct'?10:undefined},
          grid:{color:'#1a2f4a'}},
        x:{ticks:{color:'#5B9BD5',font:{size:10}},grid:{color:'transparent'}}
      }
    }
  });
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildMobileNav(){
  const pages=[{label:'Executive',href:'index.html'},{label:'Governance',href:'governance.html'},{label:'Performance',href:'performance.html'},{label:'Financial',href:'#',soon:true}];
  function apply(){
    const nl=document.querySelector('.nav-links');if(!nl)return;
    let strip=document.querySelector('.nav-mobile-menu');
    if(window.innerWidth<=600){
      nl.style.display='none';
      if(!strip){
        strip=document.createElement('div');strip.className='nav-mobile-menu';
        strip.innerHTML=pages.map(function(p){return '<a class="nav-mobile-link'+(p.href==='performance.html'?' active':'')+(p.soon?' soon':'')+'" href="'+p.href+'">'+p.label+'</a>';}).join('');
        nl.parentNode.insertBefore(strip,nl);
      }
    } else {nl.style.display='flex';if(strip)strip.remove();}
  }
  apply();window.addEventListener('resize',apply);
}
</script>
